<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Catalogo Bolsos Fevel</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI',Arial,sans-serif; }
body { background:#F5F5F5; color:#1A1A1A; }
.header { background:#111111; padding:14px 28px; display:flex; align-items:center; gap:20px; flex-wrap:wrap; position:sticky; top:0; z-index:200; box-shadow:0 2px 12px rgba(0,0,0,.35); }
.logo { height:46px; object-fit:contain; }
.logo-text { font-size:22px; font-weight:800; color:#fff; letter-spacing:2px; }
.title-text { font-size:15px; font-weight:700; color:rgba(255,255,255,.85); letter-spacing:.5px; white-space:nowrap; }
.header-right { flex:1; display:flex; gap:12px; align-items:center; flex-wrap:wrap; min-width:220px; }
#search { flex:1; min-width:160px; max-width:320px; padding:9px 16px; font-size:14px; border:1.5px solid rgba(255,255,255,.2); border-radius:20px; background:rgba(255,255,255,.08); color:#fff; outline:none; }
#search::placeholder { color:rgba(255,255,255,.4); }
#search:focus { border-color:rgba(255,255,255,.6); background:rgba(255,255,255,.12); }
#gen-date { font-size:11px; color:rgba(255,255,255,.4); white-space:nowrap; }
#grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; padding:20px 28px; }
.card { background:#fff; border:1px solid #EBEBEB; border-radius:8px; overflow:hidden; cursor:pointer; transition:box-shadow .18s,transform .18s; display:flex; flex-direction:column; }
.card:hover { box-shadow:0 6px 24px rgba(0,0,0,.10); transform:translateY(-2px); }
.card-img-wrap { position:relative; width:100%; padding-top:100%; background:#F8F8F8; overflow:hidden; }
.card-img-wrap img { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; display:block; }
.card-img-wrap .no-photo { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#BBB; font-size:12px; font-weight:600; text-align:center; padding:10px; }
.agotado-badge { position:absolute; bottom:6px; left:6px; background:rgba(0,0,0,.55); color:#fff; font-size:10px; font-weight:700; letter-spacing:.5px; padding:3px 8px; border-radius:4px; text-transform:uppercase; }
.card-body { padding:10px 12px 12px; flex:1; display:flex; flex-direction:column; gap:6px; }
.cod-badge { font-size:12px; font-weight:700; color:#555; letter-spacing:.5px; }
.subcat-badge { display:inline-block; font-size:9px; font-weight:700; color:#666; background:#EFEFEF; border-radius:4px; padding:2px 6px; letter-spacing:.3px; text-transform:uppercase; margin-top:2px; width:fit-content; }
.precio { font-size:15px; font-weight:800; color:#1A1A1A; }
.colors-row { display:flex; flex-wrap:wrap; gap:5px; }
.color-chip { width:16px; height:16px; border-radius:50%; border:1px solid rgba(0,0,0,.15); display:inline-block; flex-shrink:0; cursor:pointer; position:relative; }
.color-chip:hover { transform:scale(1.15); }
.color-chip.no-foto::after { content:''; position:absolute; inset:0; border-radius:50%; background-image:repeating-linear-gradient(45deg, rgba(255,255,255,.65) 0 1.5px, transparent 1.5px 3.5px); }
.tallas-row { display:flex; flex-wrap:wrap; gap:3px; margin-top:2px; }
.talla-chip { font-size:10px; font-weight:600; color:#444; background:#F0F0F0; border-radius:4px; padding:2px 6px; }
#empty { display:none; text-align:center; padding:60px 20px; color:#AAA; font-size:15px; }
.toggle-wrap { display:flex; align-items:center; gap:6px; cursor:pointer; user-select:none; white-space:nowrap; }
.toggle-wrap input { display:none; }
.toggle-slider { position:relative; width:34px; height:18px; background:rgba(255,255,255,.25); border-radius:9px; transition:background .2s; flex-shrink:0; }
.toggle-slider::after { content:''; position:absolute; width:14px; height:14px; border-radius:50%; background:#fff; top:2px; left:2px; transition:transform .2s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
.toggle-wrap input:checked + .toggle-slider { background:rgba(255,255,255,.85); }
.toggle-wrap input:checked + .toggle-slider::after { transform:translateX(16px); background:#111; }
.toggle-label { font-size:12px; color:rgba(255,255,255,.7); font-weight:500; }
select.hdr-sel { padding:7px 12px; font-size:13px; font-weight:500; border:1.5px solid rgba(255,255,255,.2); border-radius:20px; background:rgba(255,255,255,.08); color:#fff; cursor:pointer; outline:none; }
select.hdr-sel option { background:#222; color:#fff; }
#overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:500; align-items:center; justify-content:center; }
#overlay.open { display:flex; }
#modal { background:#fff; border-radius:12px; max-width:480px; width:92%; max-height:90vh; overflow-y:auto; padding:24px; position:relative; box-shadow:0 20px 60px rgba(0,0,0,.25); }
#modal-close { position:absolute; top:14px; right:16px; background:none; border:none; font-size:24px; cursor:pointer; color:#888; line-height:1; }
#modal-img { width:100%; border-radius:8px; margin-bottom:16px; display:none; }
#modal-cod { font-size:13px; color:#888; font-weight:600; margin-bottom:4px; }
#modal-subcat { font-size:11px; color:#B45309; font-weight:700; background:#FFF3D6; display:inline-block; padding:2px 8px; border-radius:10px; margin-bottom:6px; }
#modal-nombre { font-size:16px; font-weight:700; margin-bottom:8px; }
#modal-precio { font-size:22px; font-weight:800; color:#1A1A1A; margin-bottom:12px; }
#modal-colors-label, #modal-tallas-label { font-size:11px; color:#AAA; font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
#modal-colors { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
.modal-color-chip { display:flex; align-items:center; gap:6px; font-size:13px; cursor:pointer; padding:3px 8px 3px 3px; border-radius:20px; background:#F5F5F5; }
.modal-color-chip:hover { background:#EAEAEA; }
.modal-color-dot { width:18px; height:18px; border-radius:50%; border:1px solid rgba(0,0,0,.12); flex-shrink:0; position:relative; }
.modal-color-dot.no-foto::after { content:''; position:absolute; inset:0; border-radius:50%; background-image:repeating-linear-gradient(45deg, rgba(255,255,255,.65) 0 1.5px, transparent 1.5px 3.5px); }
#modal-tallas { display:flex; flex-wrap:wrap; gap:6px; }
.modal-talla-chip { font-size:12px; font-weight:600; color:#444; background:#F0F0F0; border-radius:6px; padding:4px 10px; }
/* Visor de foto por color */
#coverlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:600; align-items:center; justify-content:center; padding:20px; }
#coverlay.open { display:flex; }
#cbox { background:#fff; border-radius:12px; max-width:520px; width:100%; max-height:92vh; overflow-y:auto; position:relative; box-shadow:0 20px 60px rgba(0,0,0,.35); }
#cbox-close { position:absolute; top:12px; right:14px; background:rgba(0,0,0,.5); color:#fff; border:none; width:30px; height:30px; border-radius:50%; font-size:20px; cursor:pointer; line-height:1; z-index:2; }
#cbox-img { width:100%; display:block; }
#cbox-noimg { width:100%; aspect-ratio:1/1; background:#F3F3F3; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:#999; text-align:center; padding:24px; }
#cbox-noimg .icono { font-size:34px; }
#cbox-noimg .aviso { font-size:15px; font-weight:800; color:#B45309; background:#FFF3D6; padding:6px 14px; border-radius:20px; }
#cbox-info { padding:14px 18px 18px; }
#cbox-cod { font-size:12px; color:#888; font-weight:600; }
#cbox-color { font-size:17px; font-weight:800; margin-top:2px; }
</style>
</head>

 {}, "subcategoria": "Manos Libres"}, {"_idx": 573, "cod": "80609", "nombre": "80609", "precio": 0, "cantidad": 1, "foto": "fotos/80609.jpg", "colores": ["Café"], "tallas": [], "talla_colores": {}, "color_tallas": {}, "colores_fotos": {"Café": "fotos/80609.jpg"}, "mysoft_activo": true, "precios_ciudad": {}, "subcategoria": "Manos Libres"}, {"_idx": 574, "cod": "80610", "nombre": "80610", "precio": 495000, "cantidad": 3, "foto": "fotos/80610.jpg", "colores": ["Miel", "Negro"], "tallas": [], "talla_colores": {}, "color_tallas": {}, "colores_fotos": {}, "mysoft_activo": true, "precios_ciudad": {"Cartago": 495000}, "subcategoria": "Morrales"}, {"_idx": 575, "cod": "80611", "nombre": "80611", "precio": 367000, "cantidad": 5, "foto": "fotos/80611.jpg", "colores": ["Dorado", "Negro", "Rojo"], "tallas": [], "talla_colores": {}, "color_tallas": {}, "colores_fotos": {}, "mysoft_activo": true, "precios_ciudad": {"Cartago": 367000}, "subcategoria": "Otros"}, {"_idx": 576, "cod": "80612", "nombre": "80612", "precio": 0, "cantidad": 1, "foto": "", "colores": ["Verde"], "tallas": [], "talla_colores": {}, "color_tallas": {}, "colores_fotos": {}, "mysoft_activo": true, "precios_ciudad": {}, "subcategoria": ""}, {"_idx": 577, "cod": "80613", "nombre": "80613", "precio": 290000, "cantidad": 4, "foto": "fotos/80613.jpg", "colores": ["Dorado", "Negro"], "tallas": [], "talla_colores": {}, "color_tallas": {}, "colores_fotos": {}, "mysoft_activo": true, "precios_ciudad": {"Cartago": 315000}, "subcategoria": "Otros"}, {"_idx": 578, "cod": "80614", "nombre": "80614", "precio": 0, "cantidad": 1, "foto": "fotos/80614.jpg", "colores": ["Café"], "tallas": [], "talla_colores": {}, "color_tallas": {}, "colores_fotos": {"Café": "fotos/80614.jpg"}, "mysoft_activo": true, "precios_ciudad": {}, "subcategoria": "Otros"}, {"_idx": 579, "cod": "80615", "nombre": "80615", "precio": 267000, "cantidad": 0, "foto": "fotos/80615.jpg", "colores": [], "tallas": [], "talla_colores": {}, "color_tallas": {}, "colores_fotos": {}, "mysoft_activo": true, "precios_ciudad": {"Cartago": 267000}, "subcategoria": "Manos Libres"}, {"_idx": 580, "cod": "80616", "nombre": "80616", "precio": 0, "cantidad": 1, "foto": "fotos/80616.jpg", "colores": ["Fucsia"], "tallas": [], "talla_colores": {}, "color_tallas": {}, "colores_fotos": {"Fucsia": "fotos/80616.jpg"}, "mysoft_activo": true, "precios_ciudad": {}, "subcategoria": "Otros"}, {"_idx": 581, "cod": "80617", "nombre": "80617", "precio": 0, "cantidad": 1, "foto": "fotos/80617.jpg", "colores": ["Verde"], "tallas": [], "talla_colores": {}, "color_tallas": {}, "colores_fotos": {"Verde": "fotos/80617.jpg"}, "mysoft_activo": true, "precios_ciudad": {}, "subcategoria": "Manos Libres"}, {"_idx": 582, "cod": "80619", "nombre": "80545 sin ribetes", "precio": 387000, "cantidad": 1, "foto": "fotos/80619.jpg", "colores": ["Miel"], "tallas": [], "talla_colores": {}, "color_tallas": {}, "colores_fotos": {"Miel": "fotos/80619.jpg"}, "mysoft_activo": true, "precios_ciudad": {"Cartago": 387000}, "subcategoria": "Otros"}, {"_idx": 583, "cod": "80620", "nombre": "80620", "precio": 0, "cantidad": 0, "foto": "fotos/80620.jpg", "colores": [], "tallas": [], "talla_colores": {}, "color_tallas": {}, "colores_fotos": {}, "mysoft_activo": true, "precios_ciudad": {}, "subcategoria": "Otros"}];
let searchQ='',filterTalla='',filterColor='',filterSubcat='';
function precioCartago(p){return p.precios_ciudad&&p.precios_ciudad['Cartago']?p.precios_ciudad['Cartago']:0;}
(function(){
  const at=[...new Set(PRODUCTS.flatMap(p=>p.tallas))];
  at.sort((a,b)=>{const na=parseFloat(a),nb=parseFloat(b);if(!isNaN(na)&&!isNaN(nb))return na-nb;if(!isNaN(na))return -1;if(!isNaN(nb))return 1;return a.localeCompare(b);});
  const st=document.getElementById('filter-talla');
  at.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;st.appendChild(o);});
  const ac=[...new Set(PRODUCTS.flatMap(p=>p.colores))].sort((a,b)=>a.localeCompare(b));
  const sc=document.getElementById('filter-color');
  ac.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sc.appendChild(o);});
  const asub=[...new Set(PRODUCTS.map(p=>p.subcategoria).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
  const ssub=document.getElementById('filter-subcat');
  if(ssub) asub.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;ssub.appendChild(o);});
})();
const COLOR_MAP_JS={"negro": "#1C1C1C", "blanco": "#F0F0F0", "beige": "#E8D5B0", "talco": "#EDE8DE", "crema": "#FFF8E7", "rojo": "#CC2222", "rojo napa": "#B52020", "azul": "#1155CC", "azul napa": "#1044AA", "cafe": "#6B4226", "cafe napa": "#5A3520", "miel": "#C8860A", "rosado": "#FF6B9D", "rosado napa": "#EE5A8A", "gris": "#888888", "gris napa": "#909090", "plomo": "#708090", "plata": "#B0B0B0", "dorado": "#D4AF37", "bronce": "#B87333", "vinotinto": "#7B2336", "verde": "#2D7D3A", "verde napa": "#256832", "naranja": "#E87722", "amarillo": "#F0C030", "morado": "#7B2D8B", "folia": "#C9A87C", "natural": "#D4C5A0", "mostaza": "#C9A227", "nude": "#D8B394", "multi": "linear-gradient(135deg,#FF6B6B,#4ECDC4,#45B7D1,#96CEB4)", "multicolor": "linear-gradient(135deg,#FF6B6B,#4ECDC4,#45B7D1,#96CEB4)", "sin iden.": "#CCCCCC", "sin identificar": "#CCCCCC"};
function colorStyle(n){const k=n.toLowerCase().trim();const v=COLOR_MAP_JS[k]||COLOR_MAP_JS[k.split(' ')[0]]||'#BBBBBB';return v.startsWith('linear-gradient')?`background:${v}`:`background:${v}`;}
function fmtPrecio(p){if(!p)return'';return'$'+parseInt(p).toLocaleString('es-CO');}
function render(){
  const grid=document.getElementById('grid'),empty=document.getElementById('empty'),q=searchQ.toLowerCase();
  const visible=PRODUCTS.filter(p=>{
    if(q&&!p.cod.toLowerCase().includes(q)&&!p.nombre.toLowerCase().includes(q))return false;
    if(p.mysoft_activo&&p.cantidad<=0)return false;
    if(filterSubcat&&p.subcategoria!==filterSubcat)return false;
    if(filterTalla&&!p.tallas.includes(filterTalla))return false;
    if(filterColor){
      const colsEnTalla=filterTalla&&p.talla_colores&&p.talla_colores[filterTalla]?p.talla_colores[filterTalla]:p.colores;
      if(!colsEnTalla.includes(filterColor))return false;
    }
    return true;
  }).sort((a,b)=>{if(b.cantidad!==a.cantidad)return b.cantidad-a.cantidad;const na=parseFloat(a.cod),nb=parseFloat(b.cod);if(!isNaN(na)&&!isNaN(nb))return nb-na;return b.cod.localeCompare(a.cod);});
  if(!visible.length){grid.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  grid.innerHTML=visible.map(p=>{
    const visibleColores=filterTalla&&p.talla_colores&&p.talla_colores[filterTalla]?p.talla_colores[filterTalla]:p.colores;
    const chips=visibleColores.map(c=>`<div class="color-chip${p.colores_fotos&&p.colores_fotos[c]?'':' no-foto'}" style="${colorStyle(c)}" title="${c}${p.colores_fotos&&p.colores_fotos[c]?'':' (actualizar foto)'}" onclick='event.stopPropagation();openColorPhoto(${p._idx},${JSON.stringify(c)})'></div>`).join('');
    const visibleTallas=filterColor&&p.color_tallas&&p.color_tallas[filterColor]?p.color_tallas[filterColor]:p.tallas;
    const talls=visibleTallas.map(t=>`<div class="talla-chip">${t}</div>`).join('');
    const img=p.foto?`<img src="${p.foto}" alt="${p.cod}" loading="lazy">`:'<div class="no-photo">Sin foto</div>';
    const pr=precioCartago(p);
    return `<div class="card" onclick="openModal(${p._idx})">
      <div class="card-img-wrap">${img}</div>
      <div class="card-body">
        <div class="cod-badge">${p.cod}</div>
        ${p.subcategoria?`<div class="subcat-badge">${p.subcategoria}</div>`:''}
        ${pr?`<div class="precio">${fmtPrecio(pr)}</div>`:''}
        <div class="colors-row">${chips}</div>
        ${p.tallas.length?`<div class="tallas-row">${talls}</div>`:''}
      </div></div>`;
  }).join('');
}
document.getElementById('search').addEventListener('input',e=>{searchQ=e.target.value.trim();render();});
document.getElementById('filter-talla').addEventListener('change',e=>{filterTalla=e.target.value;render();});
document.getElementById('filter-color').addEventListener('change',e=>{filterColor=e.target.value;render();});
const _fsub=document.getElementById('filter-subcat');
if(_fsub) _fsub.addEventListener('change',e=>{filterSubcat=e.target.value;render();});
function openModal(idx){
  const p=PRODUCTS[idx]; if(!p)return;
  document.getElementById('modal-img').src=p.foto||'';
  document.getElementById('modal-img').style.display=p.foto?'block':'none';
  document.getElementById('modal-cod').textContent='Codigo: '+p.cod;
  const msub=document.getElementById('modal-subcat');
  if(msub){ msub.textContent=p.subcategoria||''; msub.style.display=p.subcategoria?'inline-block':'none'; }
  document.getElementById('modal-nombre').textContent=p.nombre;
  const pr=precioCartago(p);
  document.getElementById('modal-precio').textContent=pr?fmtPrecio(pr):'';
  document.getElementById('modal-colors').innerHTML=p.colores.map(c=>`<div class="modal-color-chip" onclick='openColorPhoto(${idx},${JSON.stringify(c)})'><div class="modal-color-dot${p.colores_fotos&&p.colores_fotos[c]?'':' no-foto'}" style="${colorStyle(c)}"></div><span>${c}</span></div>`).join('');
  document.getElementById('modal-tallas').innerHTML=p.tallas.map(t=>`<div class="modal-talla-chip">${t}</div>`).join('');
  document.getElementById('modal-colors-label').style.display=p.colores.length?'':'none';
  document.getElementById('modal-tallas-label').style.display=p.tallas.length?'':'none';
  document.getElementById('overlay').classList.add('open');
}
document.getElementById('modal-close').addEventListener('click',()=>document.getElementById('overlay').classList.remove('open'));
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))document.getElementById('overlay').classList.remove('open');});
function openColorPhoto(idx,color){
  const p=PRODUCTS[idx]; if(!p)return;
  const ruta=p.colores_fotos&&p.colores_fotos[color];
  document.getElementById('cbox-cod').textContent='Codigo: '+p.cod;
  document.getElementById('cbox-color').textContent=color;
  document.getElementById('cbox-noimg-color').textContent='No esta el color '+color;
  const img=document.getElementById('cbox-img'), noimg=document.getElementById('cbox-noimg');
  if(ruta){img.src=ruta;img.style.display='block';noimg.style.display='none';}
  else{img.style.display='none';noimg.style.display='flex';}
  document.getElementById('coverlay').classList.add('open');
}
document.getElementById('cbox-close').addEventListener('click',()=>document.getElementById('coverlay').classList.remove('open'));
document.getElementById('coverlay').addEventListener('click',e=>{if(e.target===document.getElementById('coverlay'))document.getElementById('coverlay').classList.remove('open');});
render();
</script>
